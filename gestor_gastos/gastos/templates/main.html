<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestor de Gastos{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            line-height: 1.6;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 24px 32px;
            border-radius: 12px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        header h1 { font-size: 1.5rem; font-weight: 600; }
        header a {
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        header .btn-home { background: rgba(255,255,255,0.1); }
        header .btn-home:hover { background: rgba(255,255,255,0.2); }
        header .btn-add { background: #4cc9f0; color: #1a1a2e; font-weight: 600; }
        header .btn-add:hover { background: #3ab8df; }
        .messages { margin-bottom: 20px; }
        .messages p {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }
        .messages .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .messages .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .card h2 { font-size: 1.2rem; margin-bottom: 16px; color: #16213e; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #495057;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:hover { background: #f8f9fa; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .badge-cat { background: #e3f2fd; color: #1565c0; }
        .empty { text-align: center; padding: 40px 20px; color: #868e96; }
        .empty p { font-size: 1.1rem; }
        .actions a, .actions button {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 4px;
        }
        .btn-edit { background: #fff3cd; color: #856404; }
        .btn-edit:hover { background: #ffe69c; }
        .btn-delete { background: #f8d7da; color: #721c24; }
        .btn-delete:hover { background: #f5c6cb; }
        .btn-submit {
            background: #1a1a2e;
            color: white;
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #16213e; }
        .btn-secondary {
            display: inline-block;
            background: #6c757d;
            color: white;
            padding: 10px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .btn-secondary:hover { background: #5a6268; }
        .total-row { font-weight: 700; background: #f0f2f5 !important; }
        .total-row td { border-bottom: 2px solid #1a1a2e; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #495057;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4cc9f0;
        }
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filter-bar select {
            padding: 8px 14px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .filter-bar button {
            padding: 8px 20px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .filter-bar button:hover { background: #16213e; }
        .filter-bar .btn-clear {
            background: #6c757d;
        }
        .filter-bar .btn-clear:hover { background: #5a6268; }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .summary-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 10px;
            border-left: 4px solid #4cc9f0;
        }
        .summary-item .label { font-size: 0.8rem; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; }
        .summary-item .value { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; margin-top: 4px; }
        .summary-item .value.positive { color: #e63946; }
        .confirm-box {
            text-align: center;
            padding: 40px 20px;
        }
        .confirm-box p { font-size: 1.1rem; margin-bottom: 24px; color: #495057; }
        .confirm-box .gasto-info { font-weight: 600; color: #1a1a2e; }
        .confirm-actions { display: flex; gap: 12px; justify-content: center; }
        footer {
            text-align: center;
            padding: 20px;
            color: #868e96;
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; }
            table { font-size: 0.85rem; }
            th, td { padding: 8px 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{% block header %}Gestor de Gastos{% endblock %}</h1>
            <nav>
                <a href="{% url 'home' %}" class="btn-home">Inicio</a>
                <a href="{% url 'agregar' %}" class="btn-add">+ Nuevo gasto</a>
            </nav>
        </header>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}

        <footer>
            Gestor de Gastos &mdash; Django
        </footer>
    </div>
</body>
</html>
